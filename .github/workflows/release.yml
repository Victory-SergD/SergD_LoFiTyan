name: release

on:
  push:
    tags:
      - 'v*' # Cut a release by pushing a version tag, e.g. v1.2.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (M1 and above)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Intel based macs
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: install Windows signing tools (jsign + JDK)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: choco install jsign temurin -y --no-progress

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing + notarization (Developer ID, app-specific password method).
          # Inert until the secrets exist — empty values mean the build stays unsigned, nothing breaks.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing via SSL.com eSigner (cloud / jsign). Inert until secrets exist.
          SIGN_ENABLED: ${{ secrets.SSL_COM_CREDENTIAL_ID != '' }}
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LoFiTyan ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your OS from the assets below.
            The macOS build is **unsigned** — see the README for first-launch steps.

            Скачайте установщик для вашей ОС из ассетов ниже.
            macOS-сборка **не подписана** — инструкция по первому запуску в README.
          releaseDraft: true
          # Tags with a pre-release suffix (e.g. v1.0.0-beta) are marked pre-release;
          # clean tags (e.g. v1.0.0) publish as stable.
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
